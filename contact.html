<div id="contact-form">
    <h2>Fill out the form below and we will get back to you ASAP!</h2>
    <form id="contact">
        <label for="name">Full name:</label><br>
        <input type="text" id="name" name="name"><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br>
        <label for="phone">Phone number:</label><br>
        <input type="number" id="phone" name="phone"><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" placeholder="Message..."></textarea><br>
        <input type="button" value="Submit" id="btn">
    </form>
</div>

<div id="thanks">
    <h2 id="tymessage">Thank you, </h2>
    <p>We will be in touch shortly.</p>
</div>

<script>
    window.onload = function(){
        btn = document.getElementById("btn");
        btn.onclick = function(){
            person_name = document.getElementById("name").value;
            thanks(person_name);
        }
    }
    function thanks(a_name){
        document.getElementById("contact-form").style.display = "none";
        document.getElementById("tymessage").innerHTML += (" " + a_name + "!");
        document.getElementById("thanks").style.display = "block";
    }
</script>

</body>
